---
- name: Set reachable address
  set_fact:
    current_address: "{{ item.external_address | default(item.address) }}"
  loop: "{{ template_nodes.master + template_nodes.worker | default([]) }}"
  loop_control:
    label: "{{ item.address }}"

- name: Verify master node count
  ansible.builtin.assert:
    that:
      - template_nodes.master | length > 0
      - template_nodes.master | length is odd
    success_msg: Master node count {{ template_nodes.master | length }} is correct.
    fail_msg: Master node count {{ template_nodes.master | length }} is not greater than 0 or is not odd.

- name: Verify node CIDR
  ansible.builtin.assert:
    that: template_node_cidr is ansible.utils.ipv4
    success_msg: Node CIDR {{ template_node_cidr }} is valid.
    fail_msg: Node CIDR {{ template_node_cidr }} is invalid.

- name: Verify cluster CIDR is ipv4 OR ipv6
  when: not template_ipv6_enabled | default(false)
  ansible.builtin.assert:
    that: template_cluster_cidr is ansible.utils.ipv4 or template_cluster_cidr is ansible.utils.ipv6
    success_msg: Cluster CIDR {{ template_cluster_cidr }} is valid.
    fail_msg: Cluster CIDR {{ template_cluster_cidr }} is invalid.

- name: Verify service CIDR is ipv4 OR ipv6
  when: not template_ipv6_enabled | default(false)
  ansible.builtin.assert:
    that: template_service_cidr is ansible.utils.ipv4 or template_service_cidr is ansible.utils.ipv6
    success_msg: Service CIDR {{ template_service_cidr }} is valid.
    fail_msg: Service CIDR {{ template_service_cidr }} is invalid.

- name: Verify cluster CIDR is ipv4 AND ipv6
  when: template_ipv6_enabled | default(false)
  ansible.builtin.assert:
    that: >
      (
        template_cluster_cidr.split(',')[0] is ansible.utils.ipv4 or
          template_cluster_cidr.split(',')[1] is ansible.utils.ipv4
      ) and (
        template_cluster_cidr.split(',')[1] is ansible.utils.ipv6 or
          template_cluster_cidr.split(',')[0] is ansible.utils.ipv6
      )
    success_msg: Cluster CIDR {{ template_cluster_cidr }} is valid.
    fail_msg: Cluster CIDR {{ template_cluster_cidr }} is invalid.

- name: Verify service CIDR is ipv4 AND ipv6
  when: template_ipv6_enabled | default(false)
  ansible.builtin.assert:
    that: >
      (
        template_service_cidr.split(',')[0] is ansible.utils.ipv4 or
          template_service_cidr.split(',')[1] is ansible.utils.ipv4
      ) and (
        template_service_cidr.split(',')[1] is ansible.utils.ipv6 or
          template_service_cidr.split(',')[0] is ansible.utils.ipv6
      )
    success_msg: Service CIDR {{ template_service_cidr }} is valid.
    fail_msg: Service CIDR {{ template_service_cidr }} is invalid.

- name: Verify k8s_gateway
  ansible.builtin.assert:
    that: template_k8s_gateway_addr is ansible.utils.ipv4
    success_msg: k8s_gateway address {{ template_k8s_gateway_addr }} is valid.
    fail_msg: k8s_gateway address {{ template_k8s_gateway_addr }} is invalid.

- name: Verify k8s_gateway in node CIDR
  ansible.builtin.assert:
    that: template_node_cidr | ansible.utils.network_in_usable(template_k8s_gateway_addr)
    success_msg: k8s_gateway address {{ template_k8s_gateway_addr }} is within {{ template_node_cidr }}.
    fail_msg: k8s_gateway address {{ template_k8s_gateway_addr }} is not within {{ template_node_cidr }}.

- name: Verify internal ingress
  ansible.builtin.assert:
    that: template_internal_ingress_addr is ansible.utils.ipv4
    success_msg: internal ingress address {{ template_internal_ingress_addr }} is valid.
    fail_msg: internal ingress address {{ template_internal_ingress_addr }} is invalid.

- name: Verify internal ingress in node CIDR
  ansible.builtin.assert:
    that: template_node_cidr | ansible.utils.network_in_usable(template_internal_ingress_addr)
    success_msg: internal ingress address {{ template_internal_ingress_addr }} is within {{ template_node_cidr }}.
    fail_msg: internal ingress address {{ template_internal_ingress_addr }} is not within {{ template_node_cidr }}.

- name: Verify external ingress
  ansible.builtin.assert:
    that: template_external_ingress_addr is ansible.utils.ipv4
    success_msg: external ingress address {{ template_external_ingress_addr }} is valid.
    fail_msg: external ingress address {{ template_external_ingress_addr }} is invalid.

- name: Verify external ingress in node CIDR
  ansible.builtin.assert:
    that: template_node_cidr | ansible.utils.network_in_usable(template_external_ingress_addr)
    success_msg: external ingress address {{ template_external_ingress_addr }} is within {{ template_node_cidr }}.
    fail_msg: external ingress address {{ template_external_ingress_addr }} is not within {{ template_node_cidr }}.

- name: Verify kube-vip
  ansible.builtin.assert:
    that: template_kube_vip_addr is ansible.utils.ipv4
    success_msg: kube-vip address {{ template_kube_vip_addr }} is valid.
    fail_msg: kube-vip address {{ template_kube_vip_addr }} is invalid.

- name: Verify kube-vip in node CIDR
  ansible.builtin.assert:
    that: template_node_cidr | ansible.utils.network_in_usable(template_kube_vip_addr)
    success_msg: kube-vip address {{ template_kube_vip_addr }} is within {{ template_node_cidr }}.
    fail_msg: kube-vip address {{ template_kube_vip_addr }} is not within {{ template_node_cidr }}.

- name: Verify all IP addresses are unique
  ansible.builtin.assert:
    that: >
      [
        template_k8s_gateway_addr,
        template_external_ingress_addr,
        template_internal_ingress_addr,
        template_kube_vip_addr
      ] | unique | length == 4
    success_msg: All IP addresses are unique.
    fail_msg: All IP addresses are not unique.

- name: Verify nodes are not the same IPs as k8s_gateway, ingress external/internal or kube-vip
  ansible.builtin.assert:
    that: item.address not in (template_k8s_gateway_addr, template_external_ingress_addr, template_internal_ingress_addr, template_kube_vip_addr)
    success_msg: Node address {{ item.address }} is different than k8s_gateway, ingress-nginx or kube-vip.
    fail_msg: Node address {{ item.address }} is not different than k8s_gateway, ingress-nginx or kube-vip.
    quiet: true
  loop: "{{ template_nodes.master + template_nodes.worker | default([]) }}"
  loop_control:
    label: "{{ item.address }}"

- name: Verify nodes are ipv4
  ansible.builtin.assert:
    that: item.address is ansible.utils.ipv4
    success_msg: Node address {{ item.address }} is valid.
    fail_msg: Node address {{ item.address }} is invalid.
    quiet: true
  loop: "{{ template_nodes.master + template_nodes.worker | default([]) }}"
  loop_control:
    label: "{{ item.address }}"

- name: Verify nodes are in node CIDR
  ansible.builtin.assert:
    that: template_node_cidr | ansible.utils.network_in_usable(item.address)
    success_msg: Node address {{ item.address }} is within {{ template_node_cidr }}.
    fail_msg: Node address {{ item.address }} is not within {{ template_node_cidr }}.
    quiet: true
  loop: "{{ template_nodes.master + template_nodes.worker | default([]) }}"
  when: item.external_address is not defined
  loop_control:
    label: "{{ item.address }}"

- name: Verify SSH port is reachable
  ansible.builtin.wait_for:
    host: "{{ current_address }}"
    port: 22
    search_regex: OpenSSH
    timeout: 10
  connection: local
  loop: "{{ template_nodes.master + template_nodes.worker | default([]) }}"
  loop_control:
    label: "{{ current_address }}"
